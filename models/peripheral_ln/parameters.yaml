# Peripheral Lymph Node Dynamics — kinetic parameters
# Models naive CD4+ and CD8+ T-cell pools (murine).

model_id: peripheral_ln
model_version: "1"

initial_conditions:
  CD4: 200000   # naive CD4+ T cells (murine peripheral pool)
  CD8: 100000   # naive CD8+ T cells

parameters:
  # Homeostatic set points (cells)
  S4:
    value: 200000
    unit: cells
    ci_95: [180000, 220000]
    source: "Borghans & De Boer 2007, J Theor Biol"

  S8:
    value: 100000
    unit: cells
    ci_95: [90000, 110000]
    source: "Borghans & De Boer 2007, J Theor Biol"

  # Homeostatic proliferation rate constants (day^-1)
  rho_4:
    value: 0.003
    unit: day^-1
    ci_95: [0.002, 0.004]
    source: "Borghans & De Boer 2007, J Theor Biol"

  rho_8:
    value: 0.003
    unit: day^-1
    ci_95: [0.002, 0.004]
    source: "Borghans & De Boer 2007, J Theor Biol"

  # Tonic activation loss (day^-1)
  d_act:
    value: 0.001
    unit: day^-1
    ci_95: [0.0007, 0.0013]
    source: "Assumed consistent with Surh & Sprent 2008, Nature"

  # Natural death rate (day^-1)
  d_death:
    value: 0.002
    unit: day^-1
    ci_95: [0.0015, 0.0025]
    source: "Surh & Sprent 2008, Nature 450:788"

  # CD4/CD8 split of incoming thymic export
  cd4_fraction:
    value: 0.65
    unit: dimensionless
    ci_95: [0.60, 0.70]
    source: "Jiang et al. 1996, Immunity"
