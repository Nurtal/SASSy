# Thymic T-cell Selection — ABM parameters
# All values calibrated for murine thymic selection (wild-type).

model_id: thymus_selection
model_version: "2"

abm:
  n_realisations: 12      # independent realisations per checkpoint
  substep_h: 1            # sub-step size within 24-h checkpoint

# TCR affinity distribution (log-normal)
# μ = -2.5 places ~5.2 % of cells in the positive selection window [θ_low, θ_high],
# consistent with the biological 2–5 % export efficiency.
# μ = 0.0 (original) gave 80.9 % in the window — unrealistically permissive.
tcr_affinity:
  mu:    -2.5             # mean of ln(affinity) — calibrated to ~5 % pos-sel rate
  sigma: 0.8              # std of ln(affinity)
  source: "Gascoigne et al. 2001, Nat Rev Immunol — μ adjusted for biological selection rate"

parameters:
  # Positive selection window [theta_low, theta_high]
  theta_low:
    value: 0.30
    unit: dimensionless
    ci_95: [0.25, 0.35]
    source: "Hogquist et al. 1994, Cell 76:17"

  theta_high:
    value: 2.50
    unit: dimensionless
    ci_95: [2.20, 2.80]
    source: "Hogquist et al. 1994, Cell 76:17"

  # Negative selection threshold (medullary).
  # Must be strictly less than theta_high (2.50) so that a fraction of
  # positively-selected cells (affinity ∈ [theta_negative, theta_high]) are
  # at risk of clonal deletion in the medulla.
  # With theta_negative = 1.80: ~13 % of pos-selected cells have aff > 1.80
  # and are virtually all deleted over 72 medullary dwell steps.
  # Previously 3.50 (> theta_high) made medullary neg sel mechanically impossible.
  theta_negative:
    value: 1.80
    unit: dimensionless
    ci_95: [1.60, 2.00]
    source: "Kappler et al. 1987, Cell 49:273 — threshold adjusted for model consistency"

  # Encounter probability per time step (cortex)
  p_encounter_cortex:
    value: 0.30
    unit: probability·step^-1
    ci_95: [0.22, 0.38]
    source: "Modeling assumption — consistent with murine cTEC scanning dynamics (Bhatt et al. 2016 HSC niche geometry used as proxy)"

  # Encounter probability per time step (medulla)
  p_encounter_medulla:
    value: 0.15
    unit: probability·step^-1
    ci_95: [0.10, 0.20]
    source: "Modeling assumption consistent with Gallegos & Bevan 2004"

  # DN→DP transition rate (per step, in cortex)
  p_transition_DP:
    value: 0.05
    unit: probability·step^-1
    ci_95: [0.03, 0.07]
    source: "Shortman & Liu 2002, Nat Rev Immunol"

  # SP → medulla migration probability (per step)
  p_migrate_medulla:
    value: 0.10
    unit: probability·step^-1
    ci_95: [0.07, 0.13]
    source: "Modeling assumption"

  # Medullary dwell time before export (steps)
  medullary_dwell_steps:
    value: 72
    unit: steps
    ci_95: [60, 84]
    source: "Sprent & Kishimoto 2002, Philos Trans R Soc"

  # Maximum number of sub-steps a DP cell can spend in the cortex before dying
  # by neglect (biological DP lifespan ~3–4 days; 48 steps = 2 days as
  # a conservative lower bound given the high encounter rate in the model).
  max_dp_age_steps:
    value: 48
    unit: steps
    ci_95: [24, 72]
    source: "Shortman & Liu 2002, Nat Rev Immunol — DP lifespan 3–4 days"

  # Baseline progenitor import (cells·day^-1) used when no upstream signal is
  # received (e.g. THY1 standalone run).  Represents steady-state BM export.
  baseline_import:
    value: 100.0
    unit: cells·day^-1
    ci_95: [80.0, 120.0]
    source: "Bhandoola et al. 2007, Immunity — steady-state estimate"

  # CD4/CD8 lineage commitment ratio at SP stage
  cd4_fraction:
    value: 0.65
    unit: dimensionless
    ci_95: [0.60, 0.70]
    source: "Jiang et al. 1996, Immunity"
