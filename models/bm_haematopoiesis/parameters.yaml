# Bone Marrow Haematopoiesis — ODE parameters (v4, 5-compartment)
# Species: Mus musculus (C57BL/6), wild-type adult (8–12 weeks).
#
# Compartment hierarchy (v4):
#   HSC → MPP → LMPP → CLP → DN1/ETP → [blood] → thymus
#
# v3 → v4 changes:
#   • d_diff renamed to d_HSC_MPP (same value; Busch 2015 constraint preserved)
#   • alpha_myeloid / d_CLP removed; replaced by d_CLP_other / d_CLP_death
#   • New parameters: r_MPP, d_MPP_LMPP, d_MPP_death, f_lymphoid,
#                     d_LMPP_CLP, d_LMPP_death
#
# Equilibrium derivation (all in day⁻¹ unless noted):
#   λ_MPP   = d_MPP_LMPP + d_MPP_death − r_MPP = 0.15+0.07−0.20 = 0.020
#   HSC_eq  = K_niche × (1 − (d_HSC_MPP+d_apop)/r_self) = 11000×0.825 = 9075
#   MPP_eq  = d_HSC_MPP × HSC_eq / λ_MPP                = 27.22/0.02  = 1361
#   LMPP_eq = f_lymphoid × d_MPP_LMPP × MPP_eq
#             / (d_LMPP_CLP + d_LMPP_death)              = 71.45/0.12  =  595
#   CLP_eq  = d_LMPP_CLP × LMPP_eq
#             / (alpha_T + d_CLP_other + d_CLP_death)    = 47.60/0.14  =  340
#   DN1_eq  = alpha_T × CLP_eq / export_rate             = 27.20/0.15  =  181
#   flux_eq = alpha_T × CLP_eq = export_rate × DN1_eq    ≈ 27.2 cells·day⁻¹
#             (4.3× v3 value of 6.4; within murine literature range 10–100 cells·day⁻¹)

model_id: bm_haematopoiesis
model_version: "4"

initial_conditions:
  HSC:  9075    # analytical equilibrium (see derivation above)
  MPP:  1361
  LMPP:  595
  CLP:   340
  DN1:   181

parameters:

  # ── HSC self-renewal and niche ────────────────────────────────────────────

  r_self:
    value: 0.020
    unit: day^-1
    ci_95: [0.018, 0.022]
    source: "Busch et al. 2015, Nature 518:542 — murine LT-HSC self-renewal rate (single-cell tracing)"

  K_niche:
    value: 11000
    unit: cells
    ci_95: [9500, 12500]
    source: "Bhatt et al. 2016, Cell Stem Cell 18:505 — murine HSC niche carrying capacity"

  d_apop:
    value: 0.0005
    unit: day^-1
    ci_95: [0.0003, 0.0007]
    source: "Cheshier et al. 1999, PNAS 96:3120 — murine HSC intrinsic apoptosis rate"

  # ── HSC → MPP ────────────────────────────────────────────────────────────
  # Renamed from d_diff (v3); same value (Busch 2015 constraint preserved).

  d_HSC_MPP:
    value: 0.003
    unit: day^-1
    ci_95: [0.0025, 0.0035]
    source: "Busch et al. 2015, Nature 518:542; Cabezas-Wallscheid et al. 2014, Cell Stem Cell — murine HSC→MPP commitment rate"

  # ── MPP compartment ──────────────────────────────────────────────────────
  # MPPs undergo transit amplification (r_MPP > 0) before commitment.
  # Net loss rate λ_MPP = d_MPP_LMPP + d_MPP_death − r_MPP = 0.020 day⁻¹.
  # Stability: λ_MPP > 0 required; deviation of ±0.01 in any rate shifts MPP_eq ×2.

  r_MPP:
    value: 0.20
    unit: day^-1
    ci_95: [0.17, 0.23]
    source: "Oguro et al. 2013, Cell Stem Cell 13:535; Wilson et al. 2008, Nature 453:529 — murine MPP transit-amplification cycling rate (~5-day cycle)"

  d_MPP_LMPP:
    value: 0.15
    unit: day^-1
    ci_95: [0.12, 0.18]
    source: "Adolfsson et al. 2005, Cell 121:295 — murine MPP→LMPP/myeloid commitment exit rate"

  d_MPP_death:
    value: 0.07
    unit: day^-1
    ci_95: [0.05, 0.09]
    source: "Estimated from Busch et al. 2015, Nature 518:542 — murine MPP intrinsic apoptosis during transit"

  # Fraction of MPP differentiation output committed to lymphoid fate (→ LMPP).
  # Remainder (~65%) goes to myeloid/erythroid lineages.
  f_lymphoid:
    value: 0.35
    unit: dimensionless
    ci_95: [0.28, 0.42]
    source: "Adolfsson et al. 2005, Cell 121:295 — murine LMPP lineage output; Luc et al. 2012, J Exp Med 209:1441"

  # ── LMPP compartment ─────────────────────────────────────────────────────

  d_LMPP_CLP:
    value: 0.08
    unit: day^-1
    ci_95: [0.06, 0.10]
    source: "Inlay et al. 2009, J Exp Med 206:1387; Sitnicka et al. 2003, Immunity 18:463 — murine LMPP→CLP commitment rate"

  d_LMPP_death:
    value: 0.04
    unit: day^-1
    ci_95: [0.02, 0.06]
    source: "Estimated from Kondo et al. 1997, Cell 91:661 — murine LMPP apoptosis during lymphoid restriction"

  # ── CLP compartment ──────────────────────────────────────────────────────
  # alpha_T: CLP → DN1/ETP (T-lineage commitment); unchanged from v3.
  # d_CLP_other: replaces v3 alpha_myeloid; represents CLP → B/NK lineage
  #   and other lymphoid sinks (myeloid contamination << v3 because myeloid
  #   was largely filtered at LMPP stage).

  alpha_T:
    value: 0.08
    unit: day^-1
    ci_95: [0.065, 0.095]
    source: "Allman et al. 2003, Nat Immunol 4:168 — murine CLP→ETP T-lineage commitment fraction"

  d_CLP_other:
    value: 0.05
    unit: day^-1
    ci_95: [0.03, 0.07]
    source: "Rodrigues et al. 2005, Blood 105:3845 — murine CLP→B/NK branching rate (myeloid already filtered at LMPP)"

  d_CLP_death:
    value: 0.01
    unit: day^-1
    ci_95: [0.007, 0.013]
    source: "Estimated; consistent with Guo et al. 2010, J Exp Med 207:1083 — murine CLP survival kinetics"

  # ── DN1/ETP export ───────────────────────────────────────────────────────

  export_rate:
    value: 0.15
    unit: day^-1
    ci_95: [0.12, 0.18]
    source: "Bhandoola et al. 2007, Immunity 26:753 — murine BM ETP blood export rate"
